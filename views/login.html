<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Nova OTP Provider</title>
    
    <!-- Bootstrap & FontAwesome & Custom CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">

    <style>
        body {
            background-color: var(--light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem;
        }
        .auth-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-logo {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-header">
            <a href="/" class="text-decoration-none">
                <div class="auth-logo"><i class="fa-solid fa-square-rss me-2"></i>Nova OTP</div>
            </a>
            <h5 class="text-secondary fw-semibold">Sign in to your dashboard</h5>
        </div>

        <div id="alertContainer"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="emailInput" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" required>
            </div>
            
            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label for="passwordInput" class="form-label mb-0">Password</label>
                    <a href="/forgot" class="small text-decoration-none fw-semibold">Forgot Password?</a>
                </div>
                <div style="position: relative;">
                    <input type="password" class="form-control" id="passwordInput" placeholder="Enter your password" required style="padding-right: 45px;">
                    <i class="fa-solid fa-eye-slash text-secondary" id="togglePassword" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 1.1rem;"></i>
                </div>
            </div>

            <button class="btn btn-primary-custom w-100 py-2 fs-6 m-0 mb-3" type="submit" id="submitBtn">
                <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
            </button>

            <div class="d-flex align-items-center my-3">
                <hr class="flex-grow-1 text-muted m-0">
                <span class="mx-3 text-secondary small">or</span>
                <hr class="flex-grow-1 text-muted m-0">
            </div>

            <button class="btn btn-outline-dark w-100 py-2 fs-6 m-0 d-flex align-items-center justify-content-center gap-2" type="button" id="googleBtn" style="border-radius: var(--radius); border-color: #dee2e6;">
                <img src="https://lh3.googleusercontent.com/COxitfgDO1t3sAcocJwux5OcG134hh3ypSV3vyU1lqiW7utLI65e1AFLAHMu17a4FBU" alt="Google" style="width: 18px; height: 18px;">
                Continue with Google
            </button>
        </form>

        <div class="text-center mt-4">
            <span class="text-secondary">Don't have an account? </span>
            <a href="/signup" class="fw-semibold text-decoration-none">Register here</a>
        </div>
    </div>

    <!-- Supabase SDK & Custom Auth Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            const alertContainer = document.getElementById('alertContainer');
            const submitBtn = document.getElementById('submitBtn');
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('passwordInput');

            function showAlert(message, type = 'danger') {
                alertContainer.innerHTML = `
                    <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                        <div><i class="fa-solid ${type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation'} me-2"></i>${message}</div>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                `;
            }

            // Check URL hash/parameters for email confirmation redirect
            const params = new URLSearchParams(window.location.search);
            const hash = window.location.hash;
            if (params.has('code') || hash.includes('type=signup') || hash.includes('access_token=')) {
                showAlert('Email confirmed successfully! You can now sign in.', 'success');
                // Clean hash / query parameters from URL bar
                window.history.replaceState(null, null, window.location.pathname);
            }

            // Toggle Password Eye visibility
            togglePassword.addEventListener('click', () => {
                const isPassword = passwordInput.getAttribute('type') === 'password';
                passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
                togglePassword.classList.toggle('fa-eye');
                togglePassword.classList.toggle('fa-eye-slash');
            });

            // 1. Fetch Supabase anonymous keys from our server config
            fetch('/api/auth/config')
                .then(res => res.json())
                .then(config => {
                    if (!config.supabaseUrl || !config.supabaseKey) {
                        throw new Error('Supabase client config is missing on the server.');
                    }
                    
                    const supabaseClient = supabase.createClient(config.supabaseUrl, config.supabaseKey);

                    // 2. Handle Google OAuth Login
                    const googleBtn = document.getElementById('googleBtn');
                    googleBtn.addEventListener('click', async () => {
                        const { error } = await supabaseClient.auth.signInWithOAuth({
                            provider: 'google',
                            options: {
                                redirectTo: window.location.origin + '/dashboard'
                            }
                        });
                        if (error) showAlert(error.message, 'danger');
                    });

                    // 3. Handle Form Login
                    form.addEventListener('submit', async (e) => {
                        e.preventDefault();
                        const email = document.getElementById('emailInput').value.trim();
                        const password = document.getElementById('passwordInput').value;

                        submitBtn.disabled = true;
                        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Signing In...';

                        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

                        if (error) {
                            showAlert(error.message, 'danger');
                            submitBtn.disabled = false;
                            submitBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket me-2"></i>Sign In';
                        } else {
                            // Save session token in local storage
                            localStorage.setItem('nova_session_token', data.session.access_token);
                            localStorage.setItem('nova_user_email', data.user.email);
                            
                            // Check user role (admin/user)
                            const { data: profile } = await supabaseClient
                                .from('profiles')
                                .select('role')
                                .eq('id', data.user.id)
                                .maybeSingle();

                            // Also check the admin_profiles table
                            const { data: adminProfile } = await supabaseClient
                                .from('admin_profiles')
                                .select('id')
                                .eq('id', data.user.id)
                                .maybeSingle();

                            const isAdmin = (profile && profile.role && profile.role.toLowerCase() === 'admin') || (adminProfile && adminProfile.id);

                            if (isAdmin) {
                                window.location.href = '/admin';
                            } else {
                                window.location.href = '/dashboard';
                            }
                        }
                    });
                })
                .catch(err => {
                    showAlert(err.message, 'danger');
                });
        });
    </script>
</body>
</html>
